<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="MediaPlay" />
    <meta property="og:description" content="Reproductor de video" />
    <meta property="og:image" content="./assets/MediaPlay.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://media-play2.vercel.app" /> 
    <title>MediaPlay</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://santyxs.vercel.app/assets/MediaPlay.png" type="image/png">
</head>

<body>
    <header class="navbar">
        <div class="logo">MediaPlay ⏵</div>
        <nav>
            <button id="helpButton" class="nav-btn" title="Convertir formato">?</button>
        </nav>
    </header>

    <main class="container">
        <!-- Subir archivo -->
        <section class="upload-box">
            <label for="fileInput" class="upload-label">📂 Seleccionar archivo</label>
            <input type="file" id="fileInput" accept="video/*" hidden>
        </section>

        <!-- Información del archivo -->
        <section class="file-info">
            <p><strong>Nombre:</strong> <span id="fileName">Ningún archivo seleccionado</span></p>
            <p><strong>Resolución:</strong> <span id="fileResolution">Desconocida</span></p>
            <p><strong>Calidad:</strong> <span id="fileQuality">Desconocida</span></p>
            <p id="errorMessage" class="error-message"></p>
        </section>

        <!-- Reproductor integrado -->
        <section class="player-box">
            <video id="player" class="plyr" controls></video>
        </section>
    </main>

    <!-- Plyr JS -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.7/dist/plyr.polyfilled.js"></script>
    <script src="script.js"></script>
</body>

</html>
